version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aestheticore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aestheticore
      POSTGRES_USER: aestheticore
      POSTGRES_PASSWORD: aestheticore_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aestheticore']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aestheticore_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  mailhog:
    image: mailhog/mailhog:latest
    container_name: aestheticore_mailhog
    ports:
      - '1025:1025'   # SMTP
      - '8025:8025'   # Web UI — http://localhost:8025

volumes:
  postgres_data:
  redis_data:
